<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KinaHub Promotions</title>
</head>
<body style="margin:0;padding:0;background-color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8fafc;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 12px rgba(15,23,42,0.08);">
          <tr>
            <td style="padding:40px 36px;text-align:center;background:linear-gradient(135deg,#ea580c 0%,#fb923c 100%);color:#ffffff;">
              <img src="cid:logo" alt="KinaHub" height="40" style="display:block;margin:0 auto 18px;border:0;" />
              <h1 style="margin:0;font-size:28px;font-weight:800;letter-spacing:-0.5px;">{{ headline }}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:36px;">
              <p style="margin:0;font-size:15px;line-height:1.8;color:#334155;">{{ body }}</p>
              <div style="margin-top:28px;">
                <a href="{{ cta_url }}" style="display:inline-block;background:#f97316;color:#ffffff;text-decoration:none;font-weight:700;padding:14px 22px;border-radius:10px;">{{ cta_text }}</a>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
